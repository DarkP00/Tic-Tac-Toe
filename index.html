<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="icon" href="favicon.ico">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="game">
        <h1>Tic Tac Toe</h1>
        <div class="screen">
            <h5 id="roundState">Your Turn</h5>
            <div class="grid">
                <button id="b11"><img id="i11"></button>
                <button id="b12"><img id="i12"></button>
                <button id="b13"><img id="i13"></button>

                <button id="b21"><img id="i21"></button>
                <button id="b22"><img id="i22"></button>
                <button id="b23"><img id="i23"></button>

                <button id="b31"><img id="i31"></button>
                <button id="b32"><img id="i32"></button>
                <button id="b33"><img id="i33"></button>
            </div>
        </div>
        <div class="state">
            <h4 id="win">Test <br> 00</h4>
            <h4 id="tie">Test <br> 00</h4>
            <h4 id="lose">Test <br> 00</h4>
        </div>
        <div class="restart">
            <button id="restart">Restart</button>
            <h6 id="sign">BY Pokachu</h6>
        </div>
    </div>
</body>
</html>
