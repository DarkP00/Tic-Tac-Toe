<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="icon" href="favicon.ico">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="game">
        <h1>Tic Tac Toe</h1>
        <div class="screen">
            <h5 id="roundState">Your Turn!</h5>
            <div class="grid">
                <button id="a1" onclick="
                    main(0);"><img id="i0"></button>
                <button id="a2" onclick="
                    main(1);"><img id="i1"></button>
                <button id="a3" onclick="
                    main(2);"><img id="i2"></button>

                <button id="b1" onclick="
                    main(3);"><img  id="i3"></button>
                <button id="b2" onclick="
                    main(4);"><img  id="i4"></button>
                <button id="b3" onclick="
                    main(5);"><img  id="i5"></button>

                <button id="c1" onclick="
                    main(6);"><img  id="i6"></button>
                <button id="c2" onclick="
                    main(7);"><img  id="i7"></button>
                <button id="c3" onclick="
                    main(8);"><img  id="i8"></button>
            </div>
        </div>
        <div class="state">
            <h4 id="win">Win<br>0</h4>
            <h4 id="tie">Tie<br>0</h4>
            <h4 id="lose">Lose<br>0</h4>
        </div>
        <div class="restart">
            <button id="replay" onclick="
                rePlay();
            ">Replay</button>
            <button id="restart" onclick="
                reSet();
            ">Restart</button>
            <h6 id="sign">BY Pokachu</h6>
        </div>
    </div>
    <script src="assets/js/load2.js"></script>
    <script src="assets/js/logic2.js"></script>
</body>
</html>
